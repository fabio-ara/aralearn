# Simple workflow for deploying static content to GitHub Pages
name: Publicar versão web no Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Gerar catálogo embarcado
        run: node scripts/sync-hardcoded-content.mjs
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Preparar arquivos da versão web
        run: |
          mkdir -p .pages
          touch .pages/.nojekyll
          cp index.html app.js styles.css .pages/
          cp -R assets .pages/assets
          cp -R content .pages/content
          cp -R modules .pages/modules
      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.pages'
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
